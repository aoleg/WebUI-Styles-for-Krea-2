  - 'Composition: tight crop, the frame cutting into the subject so only a fragment fills it, edges slicing through forms, and no surrounding context.'
  - 'Composition: a frame within a frame, the subject seen through a doorway, window or arch that borders the image, with layered depth.'
  - 'Composition: layered depth, a foreground element at the edge, the subject in the midground, and a receding background behind.'
  - 'Composition: Dutch angle, the whole frame rotated so horizon and verticals lean to one side, and the subject held askew.'

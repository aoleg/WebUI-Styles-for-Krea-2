# Krea-2 style wildcards for sd-dynamic-prompts
# https://github.com/adieyal/sd-dynamic-prompts
#
# Converted from styles.csv. Every category from the CSV becomes a wildcard
# file accessed as __styles/<category>__ , e.g.:
#
#   __styles/film-stocks__
#   __styles/lighting__
#   __styles/camera-position-optics__
#
# Usage: drop this file in your `extensions/sd-dynamic-prompts/wildcards/`
# folder (any subfolder is fine, filename does not have to match this
# comment) and insert wildcards directly into your own prompt text, e.g.:
#
#   a red vintage bicycle leaning against a brick wall, __styles/film-stocks__
#
# NOTE ON NEGATIVES: styles.csv pairs each style with its own negative
# prompt automatically. Wildcard files have no equivalent mechanism --
# __styles/x__ and __styles_negative/x__ are drawn independently, so
# picking a random film stock in your positive prompt does NOT
# automatically pull its matching negative into the negative prompt box.
# The styles_negative tree below preserves the same category names and
# list order as styles purely for manual reference / manual pairing by
# index; it will not auto-sync during generation. Most film-stock and
# decade negatives are the same shared line anyway ("a clinical digital
# photograph with noise-free rendering, oversharpened edges, and an
# HDR-processed look") so pasting that one line as a static negative
# covers most of the pack; only Quality, Digital Snapshots, Flash
# Photography, The Misc Bin, Lighting, Composition, Camera Position &
# Optics, Color & Tonality, Atmosphere, Moment & Motion, and Focus & Depth
# have negatives that differ per entry.

styles:
  quality:
  - 'The photo has the technical qualities of a digital SLR photograph shot with a large-aperture lens: a shallow depth of field with the subject in crisp sharp focus and the background dissolving into smooth natural bokeh, accurate true-to-life color, high dynamic range holding detail in both highlights and shadows, fine resolved texture with no digital noise, and clean full-frame sensor clarity.'
  - 'The photo has the technical qualities of a high-quality photograph: crisp fine detail resolved across the frame, accurate natural color with a full range of tones from deep shadows to bright highlights, no visible noise, blur, or compression artifacts, clean accurate optical rendering, and an overall crisp, high-fidelity clarity.'
  film-stocks:
  - 'The photo is in the style of 35mm color film photography: natural color rendition with a gentle warm cast, soft organic grain, subtle halation around bright highlights, slightly lifted blacks, and the character of a vintage prime lens with imperfect corner sharpness.'
  - 'The photo is in the style of a casual analog point-and-shoot snapshot: direct on-camera flash falloff, slightly tilted framing, mild vignetting, muted consumer-film colors, visible grain, and the unposed, spontaneous feel of a found photograph from a family album.'
  - 'The photo is in the style of high-ISO film photography shot on pushed 1600-speed stock: coarse, clearly visible grain across the whole frame, crushed shadows, slightly muddy midtones, low color saturation, and a raw documentary mood.'
  - 'The photo is in the style of expired color film: unpredictable magenta and green color shifts, faded washed-out contrast, chemical fogging in the shadows, uneven grain, soft light leaks bleeding in from the frame edges, and a degraded nostalgic quality.'
  - 'The photo is in the style of Kodachrome slide film: rich, deeply saturated reds and warm skin tones, dense inky blacks, fine grain, strong micro-contrast, and the timeless mid-century reportage look of a National Geographic archive slide.'
  - 'The photo is in the style of Kodak Portra 400 film: warm, true-to-life skin tones, fine grain, gentle natural contrast with full shadow and highlight detail retained, and an understated, flattering portrait look.'
  - 'The photo is in the style of Kodak Ektar 100 film: vivid yet true-to-life saturation with punchy reds and deep blues, ultra-fine grain, crisp contrast, and a clean, vibrant look suited to landscapes and travel photography.'
  - 'The photo is in the style of Kodak Ektachrome slide film: a clean, neutral-to-cool palette with well-rendered blues, fine grain, moderate contrast, and the crisp clarity of a projected color transparency.'
  - 'The photo is in the style of Kodak Gold 200 consumer film: a warm golden-yellow cast, slightly boosted saturation, visible honest grain, forgiving soft contrast, and the unpretentious amateur look of a 1990s family snapshot taken on a point-and-shoot camera.'
  - 'The photo is in the style of Kodak Ultramax 400 drugstore film: punchy saturated color with a warm bias, noticeable grain, everyday casual framing, and the cheerful amateur feel of vacation snapshots from a compact camera.'
  - 'The photo is in the style of Kodak Tri-X black-and-white film: gritty, pronounced classic grain, strong contrast with deep blacks and luminous highlights, and the raw, urgent character of street and photojournalism work.'
  - 'The photo is in the style of Fujifilm Velvia 50 slide film: dramatically saturated greens, reds, and blues, high contrast, ultra-fine grain, and the intense, almost hyperreal color rendering beloved for landscape photography.'
  - 'The photo is in the style of Fujifilm Provia 100F slide film: faithful, neutral color reproduction, balanced moderate contrast, very fine grain, and a clean, precise transparency look without exaggeration.'
  - 'The photo is in the style of Fujifilm Superia 400 consumer film: a slightly cool palette with crisp vivid greens and blues, clean skin tones, gentle contrast, visible grain, and the easygoing amateur look of everyday snapshots from a compact camera.'
  - 'The photo is in the style of Fujifilm Pro 400H film: soft, true-to-life color with gentle natural contrast, full highlight and shadow detail retained, fine grain, and a faint mint-green cast confined only to the deepest shadow areas.'
  - 'The photo is in the style of Fujifilm Acros black-and-white film: exceptionally smooth, very fine grain, silvery graduated midtones, deep but detailed shadows, and a refined, quiet tonality.'
  - 'The photo is in the style of black-and-white Ilford HP5 film: monochrome silver-gelatin tonality with a long, smooth midtone gradation, moderate classic grain, deep blacks that retain shadow detail, and understated documentary contrast.'
  - 'The photo is in the style of Ilford Delta 3200 black-and-white film: coarse, prominent low-light grain, moody deep shadows, high contrast, and the atmospheric texture of handheld night photography.'
  - 'The photo is in the style of CineStill 800T tungsten-balanced cinema film: cool teal-leaning shadows against warm artificial lights, a signature red halation glow blooming around bright light sources, visible grain, and a moody nocturnal urban atmosphere.'
  - 'The photo is in the style of Polaroid 600 instant film: soft dreamy focus, milky lifted blacks, muted warm colors drifting toward cream and cyan, gentle vignetting, and a spontaneous amateur snapshot feel; the image fills the entire frame edge to edge, with no white instant-film border; it''s a full-bleed borderless scan of the photograph itself.'
  - 'The photo is in the style of Polaroid SX-70 instant film: creamy, muted tones with a soft pastel color drift, delicate low contrast, slight softness across the frame, and a warm 1970s vintage instant-photo character; the image fills the entire frame edge to edge, with no white instant-film border; it''s a full-bleed borderless scan of the photograph itself.'
  - 'The photo is in the style of Fujifilm Instax instant film: bright, slightly cool colors with clean saturation, soft forgiving contrast, a gentle glow in the highlights, and a cheerful casual instant-photo feel; the image fills the entire frame edge to edge, with no white instant-film border; it''s a full-bleed borderless scan of the photograph itself.'
  decades:
  - 'The photo is in the style of 1920s Pictorialist photography: a soft-focus, dreamlike monochrome image with a warm sepia or platinum tone, hazy diffused light, gentle atmospheric blur reminiscent of a charcoal drawing, and a romantic, painterly composition.'
  - 'The photo is in the style of 1920s modernist straight photography: crisp black-and-white rendering with bold geometric composition, strong diagonals and repeating forms, dramatic angular shadows, machine-age precision, and a stark New Objectivity aesthetic.'
  - 'The photo is in the style of an early Autochrome color plate: muted pastel colors with a distinctive pointillist mosaic grain, soft luminous light, gentle blooming highlights, and the fragile, dreamlike quality of the earliest color photography.'
  - 'The photo is in the style of 1930s American social documentary photography: unflinching black-and-white realism, natural harsh daylight, weathered textures and worn surfaces rendered in full tonal detail, and the dignified, empathetic framing of Depression-era FSA fieldwork.'
  - 'The photo is in the style of a 1930s Hollywood studio glamour portrait: luminous black-and-white with sculpted key lighting, deep velvety shadows, a soft glowing complexion, carefully arranged highlights in the hair and eyes, and an idealized, star-making elegance.'
  - 'The photo is in the style of 1940s film noir: stark black-and-white with hard low-key lighting, long dramatic shadows cast across the scene, slashes of light through blinds or fog, deep blacks, moody urban atmosphere, and a tense cinematic mood.'
  - 'The photo is in the style of 1940s wartime photojournalism: raw, grainy black-and-white shot on the move, slight motion blur and imperfect focus, high contrast, urgent close framing, and the visceral immediacy of a frontline press photograph.'
  - 'The photo is in the style of 1950s Kodachrome Americana: richly saturated reds and warm sunlit tones, dense blacks, fine grain, optimistic everyday scenes rendered with postcard-bright color, and the nostalgic glow of mid-century America.'
  - 'The photo is in the style of 1950s black-and-white street photography: a candid decisive moment caught on a 35mm rangefinder, natural available light, balanced classical composition, modest grain, and an observant, humanist eye for everyday life.'
  - 'The photo is in the style of a 1950s color advertising photograph: a cheerfully staged scene with even studio lighting, bright poster-like saturated colors, immaculate styling, broad smiles and idealized domestic perfection, and a crisp commercial polish of the era.'
  - 'The photo is in the style of a 1960s mod fashion editorial: high-contrast studio photography with graphic minimal backgrounds, bold poses full of movement, crisp monochrome or punchy simple color blocking, and the energetic, youth-driven glamour of Swinging London.'
  - 'The photo is in the style of 1960s psychedelic photography: intensely vivid, exaggerated colors with surreal cross-processed shifts, swirling optical distortion, prismatic lens flares and double-exposure effects, and a hallucinatory counterculture atmosphere.'
  - 'The photo is in the style of 1970s American New Color photography: an ordinary everyday scene elevated by precise composition, dense saturated dye-transfer color with strong reds, banal suburban subject matter treated with deadpan seriousness, and warm ambient light.'
  - 'The photo is in the style of a faded 1970s family snapshot: warm yellow-orange color drift, washed-out low contrast, soft focus from a simple pocket camera, visible grain, slight vignetting, and the hazy sun-bleached nostalgia of an old photo album print.'
  - 'The photo is in the style of 1970s rock concert photography: grainy high-ISO film pushed in low light, dramatic colored stage lighting cutting through haze, deep black backgrounds, sweat and energy frozen mid-motion, and a raw backstage-pass intimacy.'
  - 'The photo is in the style of a 1980s studio glamour portrait: glossy saturated color, strong directional key light with a soft glowing fill, a hazy diffusion-filter sheen, bold styling with confident poses, and the polished airbrushed sheen of a magazine cover of the era.'
  - 'The photo is in the style of 1980s neon night photography: long-exposure city scenes glowing with pink, cyan and orange neon signage, wet streets reflecting colored light, deep blue-black skies, visible film grain, and a moody electric urban atmosphere.'
  - 'The photo is in the style of a 1980s shopping-mall portrait studio photograph: a posed subject against a painted canvas or laser-grid backdrop, flat even flash lighting, slightly soft focus, saturated consumer-film color, and an endearing amateur kitsch charm.'
  - 'The photo is in the style of a 1990s grunge-era editorial: desaturated moody color or flat monochrome, raw unpolished styling, natural window light or bare bulbs, visible grain, off-center casual framing, and a detached, unglamorous anti-fashion attitude.'
  - 'The photo is in the style of a 1990s disposable-camera snapshot: harsh direct on-camera flash flattening the subject against a dark falloff background, red-eye-era party candidness, slightly green-shifted consumer film color, visible grain, and careless spontaneous framing.'
  - 'The photo is in the style of 1990s cross-processed fashion and music photography: shifted cyan-green skin tones with blown contrasty highlights, deep teal shadows, gritty grain, tilted dynamic angles, and the restless alternative-culture energy of the MTV era.'
  - 'The photo is in the style of an early-2000s compact digital camera snapshot: a low-resolution CCD-sensor look with slightly oversaturated punchy colors, harsh direct on-camera flash, deep dark backgrounds with hard falloff, mild digital noise and compression artifacts, and careless casual party framing.'
  - 'The photo is in the style of Y2K-era photography: glossy high-key lighting with a cool blue-and-silver cast, shiny reflective surfaces and translucent plastics, a bright optimistic techno-futurist sheen, slight bloom on the highlights, and crisp turn-of-the-millennium commercial polish.'
  - 'The photo is in the style of a 2000s tabloid paparazzi photograph: a candid subject caught mid-motion by a blinding direct flash at night, flattened harsh lighting, slightly blown highlights, dark urban background, imperfect rushed framing, and a raw celebrity-culture immediacy.'
  - 'The photo is in the style of late-2000s indie sleaze party photography: gritty direct-flash nightlife shots with sweaty candid energy, oversaturated reds and greens, deep murky shadows, cluttered chaotic backgrounds, and a deliberately trashy, unfiltered downtown-scene attitude.'
  - 'The photo is in the style of an early-2010s filtered social photo: warm faded matte tones with lifted milky blacks, a soft peach-and-teal color wash, gentle vignetting, slightly crushed dynamic range, and the cozy nostalgic mood of early Instagram filters.'
  - 'The photo is in the style of 2010s VSCO-era lifestyle photography: airy desaturated pastels with soft natural window light, generous negative space, muted greens and creamy skin tones, a light film-emulation grain, and a calm, curated minimalist mood.'
  - 'The photo is in the style of 2010s HDR landscape photography: aggressively tone-mapped detail in every shadow and cloud, hyperreal saturated skies, glowing halos around horizons and edges, crunchy over-sharpened textures, and a dramatic, almost painterly excess.'
  - 'The photo is in the style of 2010s cinematic color grading: a strong teal-and-orange palette with cool cyan shadows against warm glowing skin tones, shallow depth of field, anamorphic-feeling contrast, and a moody blockbuster-film-still atmosphere.'
  - 'The photo is in the style of 2010s drone aerial photography: a striking top-down or high-oblique view turning the landscape into graphic patterns, crisp detail, saturated confident color, long shadows adding depth, and a clean, vertiginous sense of scale.'
  - 'The photo is in the style of modern mirrorless-camera photography: exceptionally sharp rendering with creamy shallow depth of field, accurate natural color, soft controlled highlight roll-off, subtle contrast, and a refined contemporary editorial cleanliness.'
  - 'The photo is in the style of 2020s golden-hour lifestyle photography: warm low sun backlighting the subject with a glowing rim of light, gentle lens flare and atmospheric haze, honeyed skin tones, soft bokeh, and an aspirational, sun-drenched social-media warmth.'
  - 'The photo is in the style of the 2020s film-photography revival: a contemporary scene shot on 35mm color negative film with soft organic grain, gentle halation on highlights, slightly muted true-to-life color, relaxed candid framing, and a deliberate, unhurried analog warmth.'
  - 'The photo is in the style of 2020s deliberately imperfect photography: intentional motion blur and missed focus, a spontaneous frame grabbed mid-moment, flash mixed with ambient smear, off-kilter composition, and an anti-polished, authentically chaotic energy.'
  digital-snapshots:
  - 'The photo is in the style of a casual smartphone snapshot taken on the go: everything in the frame is in sharp focus with the deep depth of field of a small phone sensor, flat automatic HDR-balanced exposure, a slightly tilted horizon, loose careless framing that clips objects at the edges, and the unstaged, mid-moment feel of a photo taken in two seconds without composing.'
  - 'The photo is in the style of an amateur smartphone photo taken at night with the built-in flash: the subject harshly lit and slightly overexposed against a dark background that falls off quickly, flat frontal light with hard shadows behind the subject, everything in focus, crooked spontaneous framing, and a caught-in-the-moment party-photo energy.'
  - 'The photo is in the style of a front-camera phone selfie taken at arm''s length: the face large in the frame and slightly wide-angle distorted from the close distance, one raised shoulder and part of an arm entering the frame from below, a high slightly-downward angle, everything from face to background in focus, uneven ambient lighting, and a spontaneous unposed self-shot feel with the horizon tilted.'
  - 'The photo is in the style of a 0.5x ultra-wide phone selfie: strong fisheye-like barrel distortion stretching and curving the edges of the frame, the face slightly bulged at the center with exaggerated perspective, arms and surroundings warping outward toward the corners, a huge amount of background visible and all of it in focus, playful chaotic framing from a low or overhead arm angle, and a goofy spontaneous group-selfie energy.'
  - 'The photo is in the style of a casual mirror selfie: the subject photographing their own reflection with the smartphone visible in hand partially covering or beside the face, flat indoor ambient lighting, everything in focus, a cluttered everyday room reflected in the background, slightly tilted framing, and a relaxed unglamorous self-documented feel.'
  - 'The photo is in the style of a rushed tourist phone snapshot: a landmark or scene photographed hastily among other people, a noticeably tilted horizon, strangers walking through the frame with limbs cut off at the edges, everything in deep sharp focus, flat midday automatic exposure, and the artless hurried framing of someone taking a quick photo before moving on.'
  - 'The photo is in the style of a casual phone photo of food taken at the table: shot from a seated position at a slightly-off overhead angle, mixed indoor restaurant lighting with a mild color cast, the plate partially cropped along with cutlery, glasses and a companion''s hands at the frame edges, everything in focus, and an unstyled quick before-eating snapshot feel.'
  flash-photography:
  - 'The photo is in the style of direct on-camera flash photography: hard frontal light flattening the subject against the scene, a crisp dark shadow outlining the subject on the wall close behind, bright slightly specular skin and surfaces, quick falloff into darker surroundings, saturated punchy color, and a bold confrontational immediacy.'
  - 'The photo is in the style of an amateur flash snapshot: harsh built-in flash firing straight at the subject with slightly blown highlights on the nearest surfaces, a tilted hasty composition that clips parts of the subject at the frame edge, the background dropping quickly into murky darkness, everything in focus, and the artless caught-mid-moment feel of a photo taken without warning or care.'
  - 'The photo is in the style of a sudden surprise flash photo: the subject caught off guard by the burst of light, eyes wide and body frozen mid-reaction, turned partly toward the camera as if just noticing it, harsh frontal flash bleaching the nearest surfaces with a stark shadow thrown behind, dark surroundings swallowing the edges of the frame, and the jolting candid energy of a photo nobody expected.'
  - 'The photo is in the style of close-range party flash photography: the subject filling the frame at arm''s length with harsh direct flash, glossy highlights on skin and drinks, motion smear in the dim edges where ambient light trails, other people''s limbs and heads crowding into the frame partially cut off, deep black falloff behind, and a loud sweaty midnight chaos.'
  - 'The photo is in the style of flash photography at dusk: the subject crisply lit by direct flash and popping forward from a deep twilight-blue ambient background that remains moodily underexposed, a slight unnatural cutout quality separating the lit subject from the darkening world, cool sky tones against the flash''s neutral light, and a cinematic staged-documentary tension.'
  - 'The photo is in the style of ring flash editorial photography: perfectly even shadowless frontal light wrapping the subject, a thin dark halo-like shadow tracing the subject''s outline against the backdrop, glossy circular catchlights, flattened fashion-forward contrast with saturated color, tight centered framing, and a slick provocative magazine directness.'
  - 'The photo is in the style of a flash photo forced through a crowd: the main subject lit by direct flash in the middle distance while out-of-focus heads, shoulders and raised hands intrude dark and half-lit into the foreground edges, the flash catching dust and haze in the air, hurried off-center framing, and the urgent shoved-forward energy of shooting over people to get the picture.'
  the-misc-bin:
  - 'The photo is in the style of a security camera frame: a high fixed corner-mounted viewpoint looking down at the scene, wide-angle coverage with mild distortion, flat washed-out contrast under harsh fluorescent or infrared-assisted lighting, muted desaturated color, soft low-detail rendering, and a small timestamp overlay in the corner of the frame.'
  - 'The photo is in the style of a dashcam still: a wide-angle view through a car windshield from the dashboard, the hood edge visible at the bottom of the frame, slightly curved wide-lens geometry, flat automatic exposure struggling with bright sky and dark road, mild motion softness, and utilitarian recording-device rendering.'
  - 'The photo is in the style of a nighttime trail camera capture: monochrome infrared illumination glowing brightest at the center and falling off at the edges, animal or subject eyes reflecting as bright glowing points, stark grayscale with blown near-foreground foliage, a fixed low mounting angle, and the raw automated feel of a motion-triggered wildlife camera.'
  - 'The photo is in the style of an action camera shot: an extreme ultra-wide first-person perspective with fisheye barrel curvature at the edges, everything from an outstretched arm or gear in the foreground to the horizon in sharp focus, vivid punchy color, bright outdoor exposure, dynamic mid-action energy, and a mounted or handheld point-of-view feel.'
  - 'The photo is in the style of an underwater disposable camera photo: a green-blue murky color cast deepening with distance, suspended particles lit by the small built-in flash, soft hazy contrast, limited visibility fading to teal, slightly warped casual framing, and the cheap cheerful feel of a vacation waterproof camera.'
  - 'The photo is in the style of a paused VHS camcorder frame: soft smeared low-resolution video texture with visible horizontal scanlines, bleeding oversaturated reds, slight color fringing and ghosting around edges, washed-out highlights, a home-video amateur framing, and the warm degraded look of a 1990s tape recording.'
  - 'The photo is in the style of an early webcam capture: a low-resolution soft mushy image lit by a computer monitor''s glow and dim room light, muddy color with a slight magenta or green cast, blocky compression softness, a fixed desk-level angle looking up at the subject, and the intimate awkward feel of a mid-2000s video-chat still.'
  - 'The photo is in the style of tilt-shift miniature photography: a real scene photographed from a high vantage point with a narrow horizontal band of sharp focus and strong blur above and below, boosted saturation and contrast making everything look like a hand-painted scale model, tiny toy-like people and vehicles, and a charming diorama effect.'
  - 'The photo is in the style of a Holga toy camera photograph: heavy dark vignetting closing in from the corners, a soft dreamy plastic-lens blur that is sharpest only at the center, unpredictable light leaks, saturated shifted color on medium-format film, and a lo-fi accidental artistry.'
  - 'The photo is in the style of Kodak Aerochrome color infrared film: healthy green foliage rendered in surreal vivid pinks, magentas and reds while skies stay deep cyan-blue and water goes dark, fine grain, otherwise realistic scene geometry, and the uncanny dreamlike palette of infrared-sensitive false-color film.'
  - 'The photo is in the style of a wet plate collodion photograph: a silvery monochrome image on a glass or metal plate with shallow swirling focus falloff, chemical streaks, drips and uneven development around the edges, pale rendered skies, long-exposure stillness in the subject, and the haunting handmade texture of 1850s-1870s photography.'
  - 'The photo is in the style of a daguerreotype: a finely detailed monochrome image on a polished silver mirror-like plate, delicate tonal shimmer that shifts between positive and negative, a formal stiffly posed subject from a long exposure, soft edge vignetting from the plate housing, and the jewel-like precision of the earliest photographic process.'
  - 'The photo is in the style of a cyanotype print: the entire image rendered in deep Prussian blue and white with no other color, soft contact-print contrast, slightly textured watercolor-paper surface showing through, hand-coated brush strokes visible at the borders of the emulsion, and a delicate antique blueprint quality.'
  - 'The photo is in the style of an in-camera double exposure on film: two scenes overlapping translucently in a single frame, the brighter areas of one image ghosting through the shadows of the other, silhouettes filled with a second landscape or texture, soft film grain unifying both layers, and a poetic accidental surrealism.'
  - 'The photo is in the style of scanography made on a flatbed scanner: objects or a face pressed directly against the glass, razor-sharp where they touch and falling off rapidly into black shallow depth, even shadowless scanner-bar illumination sweeping across the subject, slight squashing where surfaces meet the glass, and a stark clinical black void background.'
  - 'The photo is in the style of an official passport or ID photo: a head-and-shoulders subject facing the camera dead-on with a neutral expression against a plain uniform light background, flat even shadowless lighting, centered rigid framing, everything in focus, slightly unflattering documentary neutrality, and a bureaucratic institutional plainness.'
  lighting:
  - 'The photo is lit with strong rim lighting: a bright light source behind the subject tracing a luminous glowing edge along its contour, separating it cleanly from a much darker surrounding, the front of the subject falling into soft shadow with only faint detail, hair, fibers or fine edges catching the light like a halo, and a dramatic sculpted depth.'
  - 'The photo is lit in chiaroscuro: a single strong directional light carving the subject out of deep enveloping darkness, bright form emerging from near-black shadow with a slow tonal turn across curved surfaces, most of the frame swallowed in rich dark tones, painterly baroque contrast, and a quiet dramatic gravity.'
  - 'The photo is lit in extreme high-contrast chiaroscuro: a single hard directional light striking the subject while everything outside its narrow reach falls into absolute pitch-black darkness with no visible detail or gradation, the boundary between lit and unlit areas abrupt rather than gradual, illuminated surfaces rendered bright and clean against a void-like black background, near-total absence of shadow fill or ambient light, and a stark, theatrical starkness.'
  - 'The photo is lit with low-angled sculpting light that emphasizes form: light skimming across the subject so every curve, fold and crease casts its own small soft shadow, surfaces modeled in smooth gradients from highlight to shade, fabric and skin rendered with tactile dimensional relief, gentle falloff wrapping around shapes, and a sensual, form-revealing depth.'
  - 'The photo is lit with large soft diffused light: gentle illumination wrapping around the subject from a broad source, shadows that are present but feathered with slow soft edges, smooth flattering tonal transitions, delicate highlight roll-off with nothing blown out, muted quiet contrast, and a calm enveloping tenderness.'
  - 'Hard directional light strikes the subject from one side only: the near cheek and shoulder glow brightly while the far cheek and shoulder sink into deep, contrasty shadow, the light stopping right at the ridge of the nose or the edge of the form rather than at the edge of the photo. Minimal shadow fill, strong graphic contrast confined to the subject, dramatic and sculptural.'
  - 'The photo is lit with raking light grazing across surfaces at a very shallow angle: every ridge, grain, pore, thread and imperfection throwing a long micro-shadow, texture exaggerated into tangible relief, strong lateral direction with deep shadow pooling in recesses, and an almost touchable material richness.'
  - 'The photo is lit as a backlit silhouette: the subject rendered as a dark, detail-less shape against a much brighter luminous background, a clean readable outline carrying all the information, perhaps a thin bright fringe where light bends around the edge, deep shadow tones in the foreground, and a bold graphic simplicity.'
  - 'The photo is lit with dappled light: illumination broken into irregular patches and speckles falling across the subject, as if filtered through leaves, blinds or a perforated surface, alternating pools of warm light and soft shadow wandering over forms, high local contrast within a gentle overall exposure, and a lively, shifting painterly quality.'
  composition:
  - 'The photo is composed on the rule of thirds: the main subject placed off-center at an intersection of the frame''s third-lines, the horizon or dominant line resting on a third rather than the middle, breathing room in the direction the subject faces or moves, and a relaxed, naturally balanced arrangement.'
  - 'The photo is composed with strict central symmetry: the subject placed exactly in the middle of a frontally faced scene, left and right halves of the frame mirroring each other, verticals perfectly upright, an emphatic formal stillness, and a deliberate, almost ceremonial precision.'
  - 'The photo is composed with asymmetric balance: a large dominant element on one side of the frame counterweighted by a smaller distant element on the other, generous unequal areas of space between them, visual weight distributed unevenly yet feeling resolved, and a quiet compositional tension.'
  - 'The photo is composed on strong diagonals: the main lines of the scene running corner to corner, the subject aligned along a tilted axis that pulls the eye across the frame, a slight intentional camera cant amplifying the slant, converging angles adding momentum, and a restless kinetic energy.'
  - 'The photo is composed with vast negative space: a small subject occupying a corner or edge of the frame while the great majority is empty sky, wall, water or fog, minimal competing detail, silence built into the emptiness, and a spare, isolating minimalism.'
  - 'The photo is composed as an extreme tight crop: the frame cutting boldly into the subject so only a fragment fills the entire image, edges slicing through forms without apology, no visible surroundings or context, textures and partial shapes becoming the whole story, and a confrontational intimacy.'
  - 'The photo is composed with leading lines: strong converging lines running from the frame''s foreground edges toward the subject in the distance, perspective pulling the eye along a clear path into depth, the subject placed at or near the vanishing convergence, and an insistent sense of being drawn into the scene.'
  - 'The photo is composed as a frame within a frame: the subject seen through an opening - a doorway, window, arch, gap or aperture - whose dark or contrasting edges border the image on several sides, the inner scene brighter or sharper than the surrounding frame, layered depth between viewer and subject, and a voyeuristic sense of looking into another space.'
  - 'The photo is composed in distinct layers of depth: a clear foreground element anchoring the bottom or edge of the frame, the main subject in the midground, and a receding background plane behind, overlapping planes establishing scale and distance, and a rich dimensional recession from front to back.'
  - 'The photo is composed on a pronounced Dutch angle: the entire frame deliberately rotated so the horizon and verticals lean hard to one side, the subject held askew within the tilted geometry, a destabilized off-kilter reading of an otherwise coherent scene, and an undercurrent of unease and drama.'
  camera-position-optics:
  - 'The photo is taken from a low angle looking up at the subject: the camera positioned near ground level and tilted upward, the subject towering against the sky or ceiling, converging vertical lines rising through the frame, foreground ground plane compressed at the bottom edge, and an imposing, monumental presence.'
  - 'The photo is taken from a high angle looking down at the subject: the camera positioned well above and tilted downward, the ground filling most of the background, the subject appearing smaller and enclosed by its surroundings, flattened vertical forms, and a quietly observational, diminishing effect.'
  - 'The photo is taken directly overhead, pointing straight down: the scene rendered as a flat graphic plane with no horizon, shapes and objects reading as a two-dimensional arrangement, shadows falling flat across the surface, precise perpendicular geometry, and a clean map-like abstraction.'
  - 'The photo is taken from a worm''s eye view at ground level: the camera resting on or nearly touching the ground, blades of grass, pavement texture or floor detail looming huge and soft in the immediate foreground, the subject rising steeply above with extreme upward convergence, and a dramatic, miniature-observer perspective.'
  - 'The photo is taken with a long telephoto lens from far away: perspective compressed so distant planes stack tightly behind the subject, background elements appearing enlarged and close, flattened spatial depth with layers pressed together, a narrow slice of the scene isolated from afar, and a calm, compressed density.'
  - 'The photo is taken with a wide-angle lens from very close to the subject: near parts of the subject enlarged and gently stretched toward the viewer, strong perspective exaggeration with the background sweeping away small and distant, edges of the frame pulling outward, an immersive in-the-scene closeness, and a bold spatial energy.'
